<!DOCTYPE html>
<html>
<head>
    <title>Sable</title>
    <style>body{background:white;font-family:Arial;}</style>
</head>
<body>
<canvas id="c" width="256" height="256" style="border:1px solid #000"></canvas>
<br><br>

Taille: <input type="number" id="size" value="256" min="32" max="512">
Échelle: <input type="number" id="scale" value="256" min="1" max="1024">
Seed: <input type="number" id="seed" value="12345">
<br><br>
Octave1: <input type="range" id="o1" min="0" max="100" value="60"> <span id="v1">0.60</span>
Octave2: <input type="range" id="o2" min="0" max="100" value="30"> <span id="v2">0.30</span>
Octave3: <input type="range" id="o3" min="0" max="100" value="10"> <span id="v3">0.10</span>
<br><br>
R: <input type="number" id="r" value="214" min="0" max="255">
G: <input type="number" id="g" value="194" min="0" max="255">
B: <input type="number" id="b" value="165" min="0" max="255">
<br><br>
Gamma: <input type="range" id="gamma" min="1" max="500" value="25"> <span id="vg">0.25</span>
Min: <input type="range" id="minL" min="0" max="100" value="44"> <span id="vm">0.44</span>
Range: <input type="range" id="rangeL" min="0" max="100" value="88"> <span id="vr">0.88</span>
<br><br>
<button onclick="generate()">GÉNÉRER</button>
<button onclick="save()">SAUVEGARDER</button>

<script>
    function hash(x, y, seed) {
        let h = seed + x * 1234567 + y * 9876543;
        h = (h ^ (h >> 13)) * 12345;
        h = (h ^ (h >> 17)) * 98765;
        return (h % 2000) / 1000 - 1;
    }

    function generate() {
        const size = parseInt(document.getElementById('size').value);
        const scale = parseInt(document.getElementById('scale').value);
        const seed = parseInt(document.getElementById('seed').value);
        const r = parseInt(document.getElementById('r').value);
        const g = parseInt(document.getElementById('g').value);
        const b = parseInt(document.getElementById('b').value);
        const o1 = document.getElementById('o1').value / 100;
        const o2 = document.getElementById('o2').value / 100;
        const o3 = document.getElementById('o3').value / 100;
        const gamma = document.getElementById('gamma').value / 100;
        const minL = document.getElementById('minL').value / 100;
        const rangeL = document.getElementById('rangeL').value / 100;

        const c = document.getElementById('c');
        c.width = size;
        c.height = size;
        const ctx = c.getContext('2d');
        const img = ctx.createImageData(size, size);

        for(let y = 0; y < size; y++) {
            for(let x = 0; x < size; x++) {
                const u = (x / size) * scale;
                const v = (y / size) * scale;

                let n = hash(u, v, seed) * o1
                    + hash(u * 2, v * 2, seed) * o2
                    + hash(u * 4, v * 4, seed) * o3;

                n = (n + 1) * 0.5;
                n = Math.pow(n, gamma);
                n = minL + n * rangeL;

                const i = (y * size + x) * 4;
                img.data[i] = Math.max(0, Math.min(255, r * n));
                img.data[i+1] = Math.max(0, Math.min(255, g * n));
                img.data[i+2] = Math.max(0, Math.min(255, b * n));
                img.data[i+3] = 255;
            }
        }
        ctx.putImageData(img, 0, 0);
    }

    function save() {
        const c = document.getElementById('c');
        const a = document.createElement('a');
        a.download = 'sand-' + Date.now() + '.png';
        a.href = c.toDataURL();
        a.click();
    }

    ['o1','o2','o3','gamma','minL','rangeL'].forEach(id => {
        const input = document.getElementById(id);
        const span = document.getElementById('v' + id.slice(-1));
        input.addEventListener('input', () => {
            span.textContent = (input.value / 100).toFixed(2);
        });
    });

    generate();
</script>
</body>
</html>
